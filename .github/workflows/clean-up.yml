---
name: cleanup

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/clean-up.yml
  schedule:
    - cron: 30 23 * * 1

permissions: write-all

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/snok/container-retention-policy/issues/63
      # - name: Delete untagged
      #   uses: Chizkiyahu/delete-untagged-ghcr-action@main
      #   with:
      #     token: ${{ github.token }}
      #     repository: ${{ github.repository }}
      #     repository_owner: ${{ github.repository_owner }}
      #     package_name: dotfiles
      #     untagged_only: true
      #     owner_type: user

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 1
          keep_minimum_runs: 1

      - name: Delete runs by state
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_by_state_pattern: deleted

      - name: Delete runs by conclusion
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 0
          keep_minimum_runs: 0
          delete_run_by_conclusion_pattern: action_required, cancelled, failure, skipped

  # https://github.com/liskin/gh-workflow-keepalive
  keepalive:
    if: github.event_name == 'schedule'
    name: Keepalive
    runs-on: ubuntu-latest
    permissions:
      actions: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Re-enable workflow
        run: |
          case "${GITHUB_WORKFLOW_REF:?}" in
          "${GITHUB_REPOSITORY:?}"/.github/workflows/*.y*ml@*) ;;
          *) false ;;
          esac
          workflow="${GITHUB_WORKFLOW_REF%%@*}"
          workflow="${workflow#${GITHUB_REPOSITORY}/.github/workflows/}"
          echo "Re-enable $workflow"
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/enable"
